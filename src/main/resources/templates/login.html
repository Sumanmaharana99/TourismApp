<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>User Login | Tourism Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /*  Background */
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a237e, #283593);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      overflow: hidden;
      position: relative;
      color: #fff;
    }

    /*  Back Button */
    .back-btn {
      position: absolute;
      top: 25px;
      left: 25px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: #fff;
      border-radius: 50px;
      padding: 8px 22px;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s ease;
      text-decoration: none;
      backdrop-filter: blur(5px);
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateX(-3px);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }

    /*  Login Card */
    .login-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border-radius: 22px;
      padding: 45px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      width: 100%;
      max-width: 430px;
      text-align: center;
      transition: 0.3s;
      animation: fadeIn 0.7s ease-in-out;
    }

    /* Icon */
    .icon-circle {
      background: linear-gradient(135deg, #5c6bc0, #7e57c2);
      width: 85px;
      height: 85px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 38px;
      margin: 0 auto 25px auto;
      box-shadow: 0 6px 16px rgba(126, 87, 194, 0.5);
    }

    /*  Headings */
    h2 {
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
    }

    p.subtitle {
      color: #cfd8dc;
      margin-bottom: 25px;
      font-size: 0.95rem;
    }

    /*  Form Inputs */
    .form-control {
      border-radius: 12px;
      padding: 12px 15px;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      transition: 0.3s ease;
    }

    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .form-control:focus {
      background: rgba(255, 255, 255, 0.25);
      border-color: #90caf9;
      box-shadow: 0 0 8px rgba(144, 202, 249, 0.6);
    }

    label.form-label {
      color: #e3f2fd;
      font-weight: 500;
    }

    /*  Button */
    .btn-login {
      background: linear-gradient(90deg, #42a5f5, #7e57c2);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 6px 18px rgba(126, 87, 194, 0.4);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(126, 87, 194, 0.6);
      opacity: 0.95;
    }

    /*  Links */
    .link {
      text-decoration: none;
      color: #bbdefb;
      font-weight: 500;
      transition: color 0.3s;
    }

    .link:hover {
      color: #90caf9;
      text-decoration: underline;
    }

    /*  Alerts */
    .alert {
      border-radius: 10px;
      margin-bottom: 15px;
      text-align: left;
    }

    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /*  Responsive */
    @media (max-width: 500px) {
      .login-card {
        padding: 35px 25px;
      }
    }
  </style>
</head>
<body>

  <!-- Back Button -->
  <a href="/" class="back-btn">← Back</a>

  <!--  Login Card -->
  <div class="login-card">
    <div class="icon-circle">
      <i class="bi bi-person-circle"></i>
    </div>

    <h2>Welcome Back</h2>
    <p class="subtitle">Login to continue your journey!</p>

    <!--  Alert Messages -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <!-- 📝Login Form -->
    <form th:action="@{/user/login}" method="post">
      <div class="mb-3 text-start">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
      </div>

      <div class="mb-3 text-start">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="btn btn-login w-100">Login</button>

      <hr class="my-4" style="border-color: rgba(255, 255, 255, 0.2);">

      <p style="color:#cfd8dc; font-size:0.9rem;">
        Don’t have an account? 
        <a href="/user/signup" class="link">Sign Up</a>
      </p>
    </form>
  </div>

</body>
</html>

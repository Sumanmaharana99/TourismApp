<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Form</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .booking-card {
            background: #fff;
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 400px;
            text-align: center;
        }

        h2 {
            color: #2d3748;
            margin-bottom: 20px;
        }

        label {
            display: block;
            text-align: left;
            margin-bottom: 6px;
            color: #4a5568;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
<div class="booking-card">
    <h2>Book Your Trip</h2>

   <form th:action="@{/bookings/save}" method="post">
    <input type="hidden" name="userEmail" th:value="${booking.userEmail}">
    <input type="hidden" name="destination" th:value="${booking.destination}">

    <label for="travelDate">Travel Date:</label>
    <input type="date" id="travelDate" name="travelDate" required>

    <label for="numPersons">Number of Persons:</label>
    <input type="number" id="numPersons" name="numPersons" min="1" required>

    <label for="specialRequest">Special Request:</label>
    <textarea id="specialRequest" name="specialRequest" rows="3" placeholder="Any preferences?"></textarea>

    <button type="submit">Confirm Booking</button>
</form>

</div>
</body>
</html>

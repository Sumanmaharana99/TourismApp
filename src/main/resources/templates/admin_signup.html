<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Signup | Tourism Portal</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        /* Back Button */
        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.6);
            color: white;
            padding: 8px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.3s;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .container {
            background-color: white;
            width: 400px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
        }

        h2 {
            color: #1e3c72;
            margin-bottom: 8px;
        }

        p {
            color: #4a5568;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .message {
            color: green;
            font-weight: bold;
            margin-bottom: 15px;
        }

        label {
            display: block;
            text-align: left;
            font-size: 14px;
            color: #2d3748;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 14px;
        }

        input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 5px rgba(102,126,234,0.4);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(102,126,234,0.4);
        }

        .bottom-text {
            margin-top: 25px;
            font-size: 14px;
        }

        .bottom-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .bottom-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<!-- Back Button -->
<a th:href="@{/portal}" class="back-btn">← Back</a>

<div class="container">
    <div class="icon">👑</div>
    <h2>Admin Signup</h2>
    <p>Create your admin account for the Tourism Portal</p>

    <p th:if="${message}" th:text="${message}" class="message"></p>

    <form th:action="@{/admin/signup}" method="post">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Enter your full name" required>

        <label>Email Address</label>
        <input type="email" name="email" placeholder="Enter your email" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>

        <button type="submit">Sign Up</button>
    </form>

    <div class="bottom-text">
        Already have an account? <a th:href="@{/admin/login}">Login</a>
    </div>
</div>

</body>
</html>

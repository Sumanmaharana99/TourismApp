<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Tourism Portal</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <style>

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a237e, #283593);
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      color: #fff;
    }

    
    .back-btn {
      position: absolute;
      top: 30px;
      left: 30px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.6);
      color: white;
      padding: 8px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: 0.3s ease;
      text-decoration: none;
      backdrop-filter: blur(5px);
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateX(-3px);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

   
    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border-radius: 22px;
      padding: 45px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      width: 100%;
      max-width: 420px;
      text-align: center;
      animation: fadeIn 0.7s ease-in-out;
    }

  
    .icon {
      width: 85px;
      height: 85px;
      margin: 0 auto 25px auto;
      border-radius: 50%;
      background: linear-gradient(135deg, #5c6bc0, #7e57c2);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 38px;
      color: #fff;
      box-shadow: 0 6px 16px rgba(126, 87, 194, 0.5);
    }


    h2 {
      color: #ffffff;
      font-weight: 700;
      margin-bottom: 8px;
    }

    p {
      color: #cfd8dc;
      font-size: 0.95rem;
      margin-bottom: 25px;
    }

  
    label {
      display: block;
      text-align: left;
      font-size: 14px;
      color: #e3f2fd;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 15px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 15px;
      transition: 0.3s ease;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    input:focus {
      border-color: #90caf9;
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 8px rgba(144, 202, 249, 0.5);
      outline: none;
    }

   
    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .remember-container {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #e3f2fd;
    }

    .remember-container input[type="checkbox"] {
      margin: 0;
      accent-color: #7e57c2;
    }

    .options a {
      color: #bbdefb;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    .options a:hover {
      color: #90caf9;
      text-decoration: underline;
    }

  
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #42a5f5, #7e57c2);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 6px 18px rgba(126, 87, 194, 0.4);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(126, 87, 194, 0.6);
      opacity: 0.95;
    }

    /* 🔗 Bottom Text */
    .bottom-text {
      margin-top: 25px;
      font-size: 14px;
      color: #cfd8dc;
    }

    .bottom-text a {
      color: #90caf9;
      text-decoration: none;
      font-weight: 600;
    }

    .bottom-text a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

  
    @media (max-width: 480px) {
      .container {
        padding: 35px 25px;
      }
    }
  </style>
</head>
<body>


<a th:href="@{/portal}" class="back-btn">← Back</a>

<!-- 💠 Admin Login Card -->
<div class="container">
  <div class="icon">👑</div>
  <h2>Admin Login</h2>
  <p>Welcome back! Please log in to your admin account</p>

  <form th:action="@{/admin/login}" method="post">
    <label>Email Address</label>
    <input type="email" name="email" placeholder="Enter your email" required>

    <label>Password</label>
    <input type="password" name="password" placeholder="Enter your password" required>

    <div class="options">
      <div class="remember-container">
        <input type="checkbox" id="rememberMe">
        <label for="rememberMe" style="margin: 0;">Remember me</label>
      </div>
      <a href="#">Forgot Password?</a>
    </div>

    <button type="submit">Login</button>
  </form>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Tourist</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h2>Add New Tourist</h2>

<form th:action="@{/tourists/save}" th:object="${tourist}" method="post">

    <label for="name">Name:</label>
    <input type="text" th:field="*{name}" id="name" placeholder="Enter Name" required><br><br>

    <label for="city">City:</label>
    <input type="text" th:field="*{city}" id="city" placeholder="Enter City" required><br><br>

    <label for="packageType">Package Type:</label>
    <input type="text" th:field="*{packageType}" id="packageType" placeholder="Enter Package Type" required><br><br>

    <label for="budget">Budget:</label>
    <input type="number" th:field="*{budget}" id="budget" step="0.01" placeholder="Enter Budget" required><br><br>

    <button type="submit">Add Tourist</button>
</form>

</body>
</html>

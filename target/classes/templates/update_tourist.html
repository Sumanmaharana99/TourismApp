<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Tourist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="text-center text-primary mb-4">Update Tourist</h2>

    <form th:action="@{/tourists/update}" th:object="${tourist}" method="post" class="p-4 shadow rounded bg-white">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Name:</label>
            <input type="text" th:field="*{name}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">City:</label>
            <input type="text" th:field="*{city}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Package Type:</label>
            <input type="text" th:field="*{packageType}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Budget:</label>
            <input type="number" th:field="*{budget}" class="form-control" step="0.01" required>
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-primary">Update</button>
            <a th:href="@{/tourists}" class="btn btn-secondary ms-2">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
